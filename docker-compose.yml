services:
  baro-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: baro-api:latest
    container_name: baro-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config:ro
      - baro-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  baro-data:
